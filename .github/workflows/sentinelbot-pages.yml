name: SentinelBot GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - docs/site.json

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "sentinelbot-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pin checkout
        run: |
          git checkout "$GITHUB_SHA"
          echo "Deploying commit: $(git rev-parse HEAD)"

      - name: Validate docs/site.json filesystem state
        run: |
          if [ ! -f docs/site.json ]; then
            echo "site.json not available from Lambda commit yet"
            exit 1
          fi
          if [ ! -s docs/site.json ]; then
            echo "site.json not available from Lambda commit yet"
            exit 1
          fi
          checksum=$(sha256sum docs/site.json | awk '{print $1}')
          size=$(wc -c < docs/site.json)
          if [ -z "$checksum" ] || [ "$size" -le 0 ]; then
            echo "Invalid site.json artifact"
            exit 1
          fi
          node -e 'const fs=require("fs"); const crypto=require("crypto"); const raw=fs.readFileSync("docs/site.json","utf8"); const data=JSON.parse(raw); const checksum=crypto.createHash("sha256").update(raw).digest("hex"); const eventCount=Array.isArray(data.events)?data.events.length:0; if (!checksum || !eventCount && eventCount !== 0) process.exit(1); console.log(JSON.stringify({ commitSha: process.env.GITHUB_SHA, fileHash: checksum, siteJsonBytes: Buffer.byteLength(raw, "utf8"), eventCount, siteJsonPresent: true }, null, 2));'

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Pages artifact
        run: node scripts/build-pages.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
